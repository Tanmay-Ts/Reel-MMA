name: Fight Reel Pipeline

# Polls the R2 bucket for sessions that have footage but no reel yet, and
# processes every one of them. Drop clips (and an optional context.txt) into
# incoming/<session>/ and the finished reel appears in outgoing/<session>/.
on:
  schedule:
    - cron: "0 */6 * * *"     # every 6 hours
  workflow_dispatch:
    inputs:
      folder:
        description: "Process only this session folder (blank = all pending)"
        required: false
      sample_fps:
        description: "Analyzer sampling rate"
        required: false
        default: "4"
      max_clips:
        description: "Max highlights per reel"
        required: false
        default: "6"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
      R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      DRIVE_PARENT_FOLDER_ID: ${{ secrets.DRIVE_PARENT_FOLDER_ID }}
      SAMPLE_FPS: ${{ inputs.sample_fps || '4' }}
      MAX_CLIPS: ${{ inputs.max_clips || '6' }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install ffmpeg + font
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Pull new sessions from Google Drive
        continue-on-error: true
        run: |
          if [ -n "$DRIVE_PARENT_FOLDER_ID" ]; then
            python3 drive_sync.py sync
          else
            echo "Drive not configured, skipping (upload straight to R2 instead)"
          fi

      - name: Find pending sessions
        id: find
        run: |
          if [ -n "${{ inputs.folder }}" ]; then
            echo "${{ inputs.folder }}" > pending.txt
          else
            python3 r2_sync.py pending > pending.txt
          fi
          echo "Pending sessions:"; cat pending.txt
          echo "count=$(grep -c . pending.txt || true)" >> "$GITHUB_OUTPUT"

      - name: Process every pending session
        if: steps.find.outputs.count != '0'
        run: |
          set -u
          FAILED=""
          while read -r SESSION; do
            [ -z "$SESSION" ] && continue
            echo "::group::Session $SESSION"
            rm -rf work && mkdir -p work

            if ! python3 r2_sync.py download "$SESSION" --dest work; then
              echo "download failed"; FAILED="$FAILED $SESSION"; echo "::endgroup::"; continue
            fi

            # optional per-session prompt dropped in the bucket with the clips
            CTX=""
            if [ -f work/context.txt ]; then
              CTX="--context-file work/context.txt"
            fi

            if ! python3 batch_concat.py --dir work/clips --out work/combined.mp4; then
              echo "concat failed"; FAILED="$FAILED $SESSION"; echo "::endgroup::"; continue
            fi

            if ! python3 analyzer.py --video work/combined.mp4 \
                 --out work/moments.json --model gpt-4o --combine max \
                 --sample-fps "$SAMPLE_FPS" $CTX; then
              echo "analyze failed"; FAILED="$FAILED $SESSION"; echo "::endgroup::"; continue
            fi

            # master editor designs the edit; falls back internally if it fails
            python3 editor_agent.py --analysis work/moments.json \
              --out work/edl.json --style hype --target-clips "$MAX_CLIPS" $CTX || true

            EDL=""
            [ -f work/edl.json ] && EDL="--edl work/edl.json"

            if ! python3 reel_editor.py --video work/combined.mp4 \
                 --analysis work/moments.json --out work/reel.mp4 \
                 --max-clips "$MAX_CLIPS" --no-captions $EDL; then
              echo "edit failed"; FAILED="$FAILED $SESSION"; echo "::endgroup::"; continue
            fi

            if ! python3 r2_sync.py upload "$SESSION" \
                 --reel work/reel.mp4 --caption work/reel.mp4.caption.txt; then
              echo "upload failed"; FAILED="$FAILED $SESSION"; echo "::endgroup::"; continue
            fi

            echo "Session $SESSION done"
            echo "::endgroup::"
          done < pending.txt

          if [ -n "$FAILED" ]; then
            echo "Failed sessions:$FAILED"
            exit 1
          fi

      - name: Nothing to do
        if: steps.find.outputs.count == '0'
        run: echo "No pending sessions in the bucket."

# Instagram publishing is deliberately not here. Reels land in outgoing/ for a
# human to review and post. Add a publish job once the output is trusted.